aid: dati-lamma-toscana-it
name: LAMMA Toscana Open Data
description: >-
  LAMMA Toscana Open Data is a government agency open-data portal for Italy running CKAN.
  It exposes the CKAN catalog API over approximately 184 datasets from Tuscany's meteorological and environmental research agency.
